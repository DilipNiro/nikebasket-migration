# .github/workflows/ci.yml
# CI/CD NikeBasket — GitHub Actions
# Pep.pdf §4.4 livrable CI/CD
#
# Déclenché sur :
#   - push vers main ou develop
#   - pull request vers main
#
# Jobs :
#   1. lint-backend    : ESLint sur le backend Node.js
#   2. test-backend    : tests unitaires (jest) + healthcheck
#   3. build-frontend  : vite build (détecte les erreurs de compilation)
#   4. docker-build    : build docker-compose pour valider les Dockerfiles

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint backend ──────────────────────────────────────────────────────
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/ --ext .js --max-warnings 0 || true
        # "|| true" : le lint ne bloque pas le pipeline tant qu'il n'y a pas de règles ESLint définies

  # ── 2. Test backend ──────────────────────────────────────────────────────
  test-backend:
    name: Tests (backend)
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     nikebasket
          POSTGRES_PASSWORD: nikebasket_secret
          POSTGRES_DB:       ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV:     test
      PG_HOST:      localhost
      PG_PORT:      5432
      PG_USER:      nikebasket
      PG_PASSWORD:  nikebasket_secret
      PG_DATABASE:  ecommerce_test
      JWT_SECRET:   ci_test_secret_key_not_for_production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply schema
        run: psql -h localhost -U nikebasket -d ecommerce_test -f ../database/schema.sql
        env:
          PGPASSWORD: nikebasket_secret

      - name: Run tests
        run: npm test --if-present
        # Si aucun script "test" n'est défini, cette étape passe sans erreur

  # ── 3. Build frontend ────────────────────────────────────────────────────
  build-frontend:
    name: Build (frontend Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001

  # ── 4. Docker Compose build ──────────────────────────────────────────────
  docker-build:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build --no-cache
        env:
          POSTGRES_USER:     nikebasket
          POSTGRES_PASSWORD: nikebasket_secret
          POSTGRES_DB:       ecommerce
          JWT_SECRET:        ci_docker_build_key
          NODE_ENV:          production
          FRONTEND_URL:      http://localhost:5173
